<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0"
		/>
		<title>Linky</title>
		<link
			rel="stylesheet"
			href="style.css"
		/>
		<link
			rel="icon"
			type="image/svg+xml"
			href="favicon.svg"
		/>
	</head>
	<body>
		<button
			id="themeToggle"
			class="theme-btn"
			title="Toggle theme"
		>
			☀️
		</button>
		<main>
			<img
				src="favicon.svg"
				alt="Linky logo"
				class="logo"
			/>
			<h1>Linky</h1>
			<div class="header-controls">
				<div class="search-container">
					<input
						type="text"
						id="searchInput"
						placeholder="Search..."
					/>
				</div>
			</div>
			<div class="tabs">
				<button
					class="tab-btn active"
					data-tab="all"
				>
					All Sites
				</button>
				<button
					class="tab-btn"
					data-tab="favorites"
				>
					Favorites
				</button>
			</div>
			<div
				class="tags-container"
				id="tagsContainer"
			></div>
			<div
				class="services"
				id="servicesContainer"
			></div>
		</main>
		<footer>
			<p>&copy; 2026 Linky. All rights reserved.</p>
		</footer>
		<script src="script.js"></script>
	</body>
</html>
